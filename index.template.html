<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golla Lekha Harshaa | Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-slate-950 text-white">
    <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur border-b border-slate-800">
      <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-cyan-400">Harshaa</h1>

        <ul class="flex gap-6 text-sm md:text-base">
          <li><a href="#hero" class="hover:text-cyan-400">Home</a></li>
          <li><a href="#about" class="hover:text-cyan-400">About</a></li>
          <li><a href="#projects" class="hover:text-cyan-400">Projects</a></li>
          <li><a href="#contact" class="hover:text-cyan-400">Contact</a></li>
        </ul>
      </nav>
    </header>

    <div id="hero-container" class="min-h-screen flex items-center justify-center px-6"></div>

    <div id="about-container" class="py-24 px-6 bg-slate-900"></div>

    <div id="projects-container" class="py-24 px-6"></div>

    <div id="contact-container" class="py-24 px-6 bg-slate-900"></div>

    <script>
      async function loadSection(path, containerId) {
        try {
          const res = await fetch(path);
          if (!res.ok) throw new Error('Failed to load ' + path);
          const html = await res.text();
          document.getElementById(containerId).innerHTML = html;
        } catch (err) {
          console.error(err);
        }
      }

      Promise.all([
        loadSection('sections/hero.html', 'hero-container'),
        loadSection('sections/about.html', 'about-container'),
        loadSection('sections/projects.html', 'projects-container'),
        loadSection('sections/contact.html', 'contact-container')
      ]).then(() => {
        console.log('All sections loaded');
      });
    </script>
  </body>
</html>
